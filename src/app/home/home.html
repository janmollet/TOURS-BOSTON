

<!-- Language Switcher -->
<div class="d-flex justify-content-end w-100 px-4 mt-3">
  <div class="language-switcher">
    <span class="lang-label">{{ 'language.switch' | translate }}</span>
    <select (change)="useLanguage($any($event.target).value)" class="lang-select">
      <option value="en">🇺🇸 English</option>
      <option value="esp">🇪🇸 Español</option>
    </select>
  </div>
</div>

<div class="explorer-container d-flex flex-column align-items-center py-5">

  <!-- Title & Subtitle -->
  <div class="text-group text-center mb-4">
    <p class="eyebrow">Accede a nuestro mapa interactivo</p>
    <h1 class="explorer-title">{{ 'home.title' | translate }}</h1>
    <p class="explorer-subtitle">{{ 'home.subtitle' | translate }}</p>
  </div>

  <!-- Filter Buttons -->
  <div class="filter-group mb-5">
    <button class="fancy-btn" routerLink="/interactive-mp">
  Accede a nuestro mapa interactivo
</button>
  </div>

<div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
  <!-- Indicators -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3" aria-label="Slide 4"></button>
  </div>
  <!-- Slides -->
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="skyline.webp" class="d-block w-100 carousel-image" alt="Skyline">
    </div>
    <div class="carousel-item">
      <img src="library.webp" class="d-block w-100 carousel-image" alt="Library">
    </div>
    <div class="carousel-item">
      <img src="old_state_house.webp" class="d-block w-100 carousel-image" alt="Old State House">
    </div>
    <div class="carousel-item">
      <img src="boston_commons.webp" class="d-block w-100 carousel-image" alt="Boston Commons">
    </div>
  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

  

  <!-- Footer -->
  <footer class="explorer-footer mt-5 text-center">
    <p class="footer-hint">{{ 'home.footerHint' | translate }}</p>
  </footer>

</div>
